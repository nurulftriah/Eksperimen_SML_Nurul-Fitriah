name: CI MLflow - Training & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-log:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO_NAME: Eksperimen_SML_Nurul-Fitriah
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    outputs:
      run_id: ${{ steps.train.outputs.run_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run preprocessing
        run: python preprocessing/automate_Nurul-Fitriah.py

      - name: Train model & log to DagsHub MLflow
        id: train
        run: |
          python modelling_tuning.py
          # Ambil run_id dari run_id.txt yang ditulis oleh script
          RUN_ID=$(cat run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Captured Run ID: $RUN_ID"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-pkl
          path: app/model.pkl

  build-and-push-docker:
    needs: train-and-log
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX UTAMA: checkout repo agar folder ./app tersedia di runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Download model.pkl hasil training dari job sebelumnya
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: app/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest
