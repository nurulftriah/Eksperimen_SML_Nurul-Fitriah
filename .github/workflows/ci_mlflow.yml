name: MLflow CI CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_REPO_OWNER: nurulftriah
      DAGSHUB_REPO_NAME: Eksperimen_SML_Nurul-Fitriah
      MLFLOW_TRACKING_URI: https://dagshub.com/nurulftriah/Eksperimen_SML_Nurul-Fitriah.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - name: Set up job
        run: echo "Starting CI/CD job..."

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check environment
        run: |
          echo "Python version:"
          python --version
          echo "Workspace path: $GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas numpy scikit-learn matplotlib seaborn psutil fastapi uvicorn prometheus-client

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI" >> $GITHUB_ENV

      - name: Run modelling and tuning
        run: |
          python modelling_tuning.py

      - name: Get latest MLflow run_id
        id: run_id
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest MLflow Run ID: $RUN_ID"

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            tmp_artifacts/estimator.html
            tmp_artifacts/metric_info.json
            tmp_artifacts/training_confusion_matrix.png
            tmp_artifacts/feature_importance.png
            tmp_artifacts/data_schema.json
            preprocessing/namadataset_preprocessing/credit_scoring_preprocessing.csv

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t credit-scoring-model:latest ./app

      - name: Tag Docker image
        run: |
          docker tag credit-scoring-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest

      - name: Complete job
        run: echo "CI/CD pipeline completed successfully!"
