name: CI MLflow - Training & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-log:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO_NAME: Eksperimen_SML_Nurul-Fitriah
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
    outputs:
      run_id: ${{ steps.get_run_id.outputs.run_id }}

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "DAGSHUB_REPO_OWNER: $DAGSHUB_REPO_OWNER"
          echo "DAGSHUB_REPO_NAME: $DAGSHUB_REPO_NAME"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run preprocessing
        run: python preprocessing/automate_Nurul-Fitriah.py

      - name: Verify preprocessing output exists
        run: |
          if [ ! -f "preprocessing/namadataset_preprocessing/credit_scoring_preprocessing.csv" ]; then
            echo "ERROR: File preprocessing tidak ditemukan!"
            ls -la preprocessing/ || true
            exit 1
          fi
          echo "File preprocessing OK."

      - name: Run mlflow project
        run: |
          MLFLOW_TRACKING_URI="https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Nurul-Fitriah.mlflow" \
          MLFLOW_TRACKING_USERNAME="${{ secrets.DAGSHUB_USERNAME }}" \
          MLFLOW_TRACKING_PASSWORD="${{ secrets.DAGSHUB_TOKEN }}" \
          mlflow run . --env-manager=local 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: mlflow run gagal dengan exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          if [ ! -f "run_id.txt" ]; then
            echo "ERROR: run_id.txt tidak ditemukan"
            exit 1
          fi
          RUN_ID=$(cat run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Captured Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: pip install mlflow

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.sha }}
          path: |
            modelling_tuning.py
            requirements.txt
            MLproject
            run_id.txt
          retention-days: 30

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-pkl
          path: app/model.pkl

  build-and-push-docker:
    needs: train-and-log
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: downloaded-model/

      - name: Prepare build context
        run: |
          mkdir -p docker-build
          cp downloaded-model/model.pkl docker-build/model.pkl
          cp requirements.txt docker-build/requirements.txt
          cp Dockerfile docker-build/Dockerfile
          echo "=== Isi docker-build/ ==="
          ls -la docker-build/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Model
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest docker-build/

      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:${{ github.sha }}
