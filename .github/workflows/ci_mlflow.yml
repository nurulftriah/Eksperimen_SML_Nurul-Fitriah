name: CI MLflow - Training & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-log:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO_NAME: Eksperimen_SML_Nurul-Fitriah
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    outputs:
      run_id: ${{ steps.train.outputs.run_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run preprocessing
        run: python preprocessing/automate_Nurul-Fitriah.py

      - name: Verify preprocessing output exists
        run: |
          if [ ! -f "preprocessing/namadataset_preprocessing/credit_scoring_preprocessing.csv" ]; then
            echo "ERROR: File preprocessing tidak ditemukan!"
            ls -la preprocessing/ || true
            exit 1
          fi
          echo "File preprocessing OK."

      - name: Train model & log to DagsHub MLflow
        id: train
        run: |
          # Jalankan dan capture semua output (stdout + stderr)
          python modelling_tuning.py 2>&1
          EXIT_CODE=$?

          echo "=== Python exit code: $EXIT_CODE ==="

          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: modelling_tuning.py gagal dengan exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          if [ ! -f "run_id.txt" ]; then
            echo "ERROR: run_id.txt tidak ditemukan meski script sukses"
            exit 1
          fi

          RUN_ID=$(cat run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Captured Run ID: $RUN_ID"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-pkl
          path: app/model.pkl

  build-and-push-docker:
    needs: train-and-log
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-pkl
          path: app/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest
